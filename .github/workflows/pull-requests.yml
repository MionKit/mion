name: Pull Request Checks
run-name: ${{ github.actor }} Pull Request Checks 🚀
on: pull_request
jobs:
  pull-request-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from the `packageManager` field in package.json.

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        # `--frozen-lockfile` refuses installs when pnpm-lock.yaml would change.
        # Combined with `.npmrc` settings (ignore-scripts, minimum-release-age,
        # allow-non-registry-protocols=false) this hardens the install step.
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm run check-format-pre-commit

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test
