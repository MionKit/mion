name: Pull Request Checks
run-name: ${{ github.actor }} Pull Request Checks 🚀
on: pull_request
jobs:
  pull-request-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from the `packageManager` field in package.json.

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        # `--frozen-lockfile` refuses installs when pnpm-lock.yaml would change.
        # Combined with `pnpm-workspace.yaml` settings (ignoreScripts,
        # minimumReleaseAge, allowNonRegistryProtocols=false) this hardens
        # the install step. Build scripts are blocked except for the
        # explicit `allowBuilds:` entries in `pnpm-workspace.yaml`.
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm run check-format-pre-commit

      - name: Lint
        run: pnpm run lint

      - name: Test
        # Batched: each vitest invocation initializes its projects' ts-runtypes
        # resolvers concurrently (~200MB each); running all 12 projects in one go
        # OOMs the runner since programs grew with the ts-runtypes migration.
        # The client batch runs alone because it spawns the managed test server.
        run: pnpm run test:ci
